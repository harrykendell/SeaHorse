name: Seahorse CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/seahorse-wheels.yml"
      - ".gitmodules"
      - "libs/**"
      - "README.md"
      - "seahorse/**"
  push:
    paths:
      - ".github/workflows/seahorse-wheels.yml"
      - ".gitmodules"
      - "libs/**"
      - "README.md"
      - "seahorse/**"

permissions:
  contents: read

jobs:
  test-suite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: seahorse

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install editable package
        run: |
          ./scripts/install_editable.sh

      - name: Run pytest suite
        run: ./scripts/test.sh

  build-wheel:
    if: github.event_name != 'pull_request'
    needs: test-suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: seahorse

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Build wheel
        run: ./scripts/build_wheel.sh

      - name: Verify wheel in a clean environment
        run: |
          python -m venv /tmp/seahorse-wheel-test
          /tmp/seahorse-wheel-test/bin/python -m pip install --upgrade pip
          /tmp/seahorse-wheel-test/bin/python -m pip install "$(ls -1t dist/seahorse-*.whl | head -n 1)" pytest
          PYTHON=/tmp/seahorse-wheel-test/bin/python ./scripts/test.sh

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seahorse-wheel-py311-linux
          path: seahorse/dist/*.whl
          if-no-files-found: error
