name: Seahorse CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/seahorse-wheels.yml"
      - ".gitmodules"
      - "seahorse/**"
      - "seahorse-old/**"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/seahorse-wheels.yml"
      - ".gitmodules"
      - "seahorse/**"
      - "seahorse-old/**"

permissions:
  contents: write

jobs:
  test-suite:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "seahorse[dev]"

      - name: Run pytest suite
        run: python -m pytest seahorse/tests/python

  build-linux-wheels:
    needs: test-suite
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        with:
          package-dir: seahorse
          output-dir: seahorse/dist
        env:
          CIBW_ARCHS_LINUX: x86_64
          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: python -m pytest {project}/seahorse/tests/python

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seahorse-linux-wheels
          path: seahorse/dist/*.whl
          if-no-files-found: error

      - name: Publish tagged wheels to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: seahorse/dist/*.whl
